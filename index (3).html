<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="নম্বর ডায়েরি" />
  <meta name="description" content="Personal Mobile Number Diary - Offline Ready" />
  <link rel="manifest" href="manifest.json" />
  <title>নম্বর ডায়েরি</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0d0d1a;
      --bg-card: #16162a;
      --bg-surface: #1e1e38;
      --accent-primary: #6c63ff;
      --accent-secondary: #ff6584;
      --accent-teal: #43e8d8;
      --accent-gold: #ffd166;
      --text-primary: #f0efff;
      --text-secondary: #9998cc;
      --text-muted: #5a598a;
      --border: rgba(108, 99, 255, 0.2);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Hind Siliguri', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(255,101,132,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, rgba(67,232,216,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; min-height: 100vh; }

    /* ===== HEADER ===== */
    .header {
      background: rgba(22, 22, 42, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(108,99,255,0.4);
    }

    .app-title h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: var(--bg-surface);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }

    .icon-btn:active { transform: scale(0.92); }
    .icon-btn.active { color: var(--accent-primary); border-color: var(--accent-primary); background: rgba(108,99,255,0.1); }

    /* ===== SEARCH ===== */
    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 40px 10px 40px;
      color: var(--text-primary);
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent-primary); }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
    }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      display: none;
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }

    .stat-chip {
      flex-shrink: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .stat-chip.active {
      background: rgba(108,99,255,0.15);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .stat-chip span:first-child { font-size: 15px; }
    .stat-count {
      background: var(--bg-surface);
      border-radius: 10px;
      padding: 1px 7px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent-teal);
    }

    /* ===== CONTACT LIST ===== */
    .contact-list { padding: 0 16px 100px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 12px 4px 6px;
    }

    .contact-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .contact-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent-primary);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .contact-card:active { transform: scale(0.98); background: var(--bg-surface); }
    .contact-card:active::before { opacity: 1; }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
      position: relative;
    }

    .contact-info { flex: 1; min-width: 0; }

    .contact-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-number {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .contact-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
    }

    .contact-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    .action-btn:active { transform: scale(0.88); }

    .btn-call { background: rgba(67,232,216,0.12); color: var(--accent-teal); }
    .btn-edit { background: rgba(255,209,102,0.12); color: var(--accent-gold); }

    /* ===== FAB ===== */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent-primary), #9c94ff);
      border: none;
      color: white;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(108,99,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 200;
    }
    .fab:active { transform: scale(0.9); }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 500;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-top: 1px solid var(--border);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--text-muted);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text-primary);
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent-primary);
    }

    .form-select option { background: var(--bg-card); }

    .form-textarea { resize: none; height: 80px; }

    .emoji-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .emoji-opt {
      width: 42px;
      height: 42px;
      border: 2px solid var(--border);
      background: var(--bg-surface);
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .emoji-opt.selected {
      border-color: var(--accent-primary);
      background: rgba(108,99,255,0.15);
    }

    .color-picker {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .color-opt {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .color-opt.selected { border-color: white; transform: scale(1.2); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-primary), #9c94ff);
      color: white;
      box-shadow: 0 4px 15px rgba(108,99,255,0.4);
    }

    .btn-secondary {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: rgba(255,101,132,0.12);
      color: var(--accent-secondary);
      border: 1px solid rgba(255,101,132,0.3);
    }

    /* ===== DETAIL MODAL ===== */
    .detail-avatar {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 16px;
    }

    .detail-name {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .detail-relation {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .number-cards { display: flex; flex-direction: column; gap: 10px; }

    .number-card {
      background: var(--bg-surface);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
    }

    .number-card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .number-card-info { flex: 1; }

    .number-card-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .number-card-value {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      color: var(--text-primary);
      margin-top: 2px;
    }

    .copy-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 6px;
      transition: color 0.2s;
    }
    .copy-btn:active { color: var(--accent-teal); }

    .note-section {
      margin-top: 16px;
      background: var(--bg-surface);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      border: 1px solid var(--border);
    }

    .note-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .note-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

    .detail-action-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 30px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.6; }
    .empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-surface);
      border: 1px solid var(--accent-teal);
      color: var(--accent-teal);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== OFFLINE BADGE ===== */
    .offline-badge {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(255,101,132,0.2);
      border: 1px solid var(--accent-secondary);
      color: var(--accent-secondary);
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      z-index: 999;
      display: none;
    }

    /* ===== SWIPE DELETE ===== */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .contact-card { animation: slideIn 0.3s ease forwards; }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 481px) {
      body { background: #080810; }
      #app {
        box-shadow: 0 0 80px rgba(108,99,255,0.15);
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">
        <div class="app-logo">📒</div>
        <div>
          <h1>নম্বর ডায়েরি</h1>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="sortBtn" title="Sort">⇅</button>
        <button class="icon-btn" id="exportBtn" title="Export">⬆</button>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="search" id="searchInput" placeholder="নাম বা নম্বর দিয়ে খুঁজুন..." />
      <button class="search-clear" id="searchClear">✕</button>
    </div>
  </div>

  <!-- STATS / FILTER BAR -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-chip active" data-filter="all">
      <span>👥</span> সব <span class="stat-count" id="countAll">0</span>
    </div>
    <div class="stat-chip" data-filter="পরিবার">
      <span>🏠</span> পরিবার <span class="stat-count" id="countFamily">0</span>
    </div>
    <div class="stat-chip" data-filter="বন্ধু">
      <span>🤝</span> বন্ধু <span class="stat-count" id="countFriend">0</span>
    </div>
    <div class="stat-chip" data-filter="অফিস">
      <span>💼</span> অফিস <span class="stat-count" id="countOffice">0</span>
    </div>
    <div class="stat-chip" data-filter="ডাক্তার">
      <span>🏥</span> ডাক্তার <span class="stat-count" id="countDoctor">0</span>
    </div>
    <div class="stat-chip" data-filter="অন্যান্য">
      <span>📋</span> অন্যান্য <span class="stat-count" id="countOther">0</span>
    </div>
  </div>

  <!-- CONTACT LIST -->
  <div class="contact-list" id="contactList"></div>

  <!-- FAB -->
  <button class="fab" id="addBtn">＋</button>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">নতুন যোগাযোগ</div>

    <div class="form-group">
      <label class="form-label">ইমোজি বেছে নিন</label>
      <div class="emoji-picker" id="emojiPicker">
        👤 👩 👨 👶 👵 👴 👩‍💼 👨‍💼 👩‍⚕️ 👨‍⚕️ 👮 🧑‍🏫 💆 🧑‍🔧 🤵 👸
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">রঙ</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>

    <div class="form-group">
      <label class="form-label">নাম *</label>
      <input class="form-input" type="text" id="inputName" placeholder="পুরো নাম লিখুন" />
    </div>

    <div class="form-group">
      <label class="form-label">মোবাইল নম্বর ১ *</label>
      <input class="form-input" type="tel" id="inputPhone1" placeholder="+880 1XXX-XXXXXX" />
    </div>

    <div class="form-group">
      <label class="form-label">মোবাইল নম্বর ২ (ঐচ্ছিক)</label>
      <input class="form-input" type="tel" id="inputPhone2" placeholder="+880 1XXX-XXXXXX" />
    </div>

    <div class="form-group">
      <label class="form-label">সম্পর্ক</label>
      <select class="form-select" id="inputRelation">
        <option value="পরিবার">🏠 পরিবার</option>
        <option value="বন্ধু">🤝 বন্ধু</option>
        <option value="অফিস">💼 অফিস</option>
        <option value="ডাক্তার">🏥 ডাক্তার</option>
        <option value="অন্যান্য">📋 অন্যান্য</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">ঠিকানা</label>
      <input class="form-input" type="text" id="inputAddress" placeholder="বাড়ি / এলাকার ঠিকানা" />
    </div>

    <div class="form-group">
      <label class="form-label">নোট</label>
      <textarea class="form-textarea" id="inputNote" placeholder="বিশেষ মন্তব্য..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancelBtn">বাতিল</button>
      <button class="btn btn-primary" id="saveBtn">সংরক্ষণ করুন</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<div class="offline-badge" id="offlineBadge">📡 অফলাইন</div>

<script>
const COLORS = [
  '#6c63ff','#ff6584','#43e8d8','#ffd166','#06d6a0',
  '#ef476f','#118ab2','#ffa552','#8338ec','#3a86ff'
];

const EMOJIS = ['👤','👩','👨','👶','👵','👴','👩‍💼','👨‍💼','👩‍⚕️','👨‍⚕️','👮','🧑‍🏫','💆','🧑‍🔧','🤵','👸'];

let contacts = JSON.parse(localStorage.getItem('nbDiary_contacts') || '[]');
let currentFilter = 'all';
let editingId = null;
let selectedEmoji = '👤';
let selectedColor = COLORS[0];
let sortMode = 'name'; // name | recent

// ===== SAVE/LOAD =====
function save() {
  localStorage.setItem('nbDiary_contacts', JSON.stringify(contacts));
}

// ===== RENDER =====
function getFilteredContacts(query = '') {
  let list = [...contacts];
  if (currentFilter !== 'all') list = list.filter(c => c.relation === currentFilter);
  if (query) {
    const q = query.toLowerCase();
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.phone1.includes(q) ||
      (c.phone2 && c.phone2.includes(q))
    );
  }
  if (sortMode === 'name') list.sort((a,b) => a.name.localeCompare(b.name, 'bn'));
  else list.sort((a,b) => b.createdAt - a.createdAt);
  return list;
}

function updateCounts() {
  const cats = { পরিবার: 0, বন্ধু: 0, অফিস: 0, ডাক্তার: 0, অন্যান্য: 0 };
  contacts.forEach(c => { if (cats[c.relation] !== undefined) cats[c.relation]++; });
  document.getElementById('countAll').textContent = contacts.length;
  document.getElementById('countFamily').textContent = cats['পরিবার'];
  document.getElementById('countFriend').textContent = cats['বন্ধু'];
  document.getElementById('countOffice').textContent = cats['অফিস'];
  document.getElementById('countDoctor').textContent = cats['ডাক্তার'];
  document.getElementById('countOther').textContent = cats['অন্যান্য'];
}

function tagStyle(relation) {
  const map = {
    'পরিবার': { bg: 'rgba(67,232,216,0.12)', color: '#43e8d8' },
    'বন্ধু': { bg: 'rgba(108,99,255,0.12)', color: '#9c94ff' },
    'অফিস': { bg: 'rgba(255,209,102,0.12)', color: '#ffd166' },
    'ডাক্তার': { bg: 'rgba(6,214,160,0.12)', color: '#06d6a0' },
    'অন্যান্য': { bg: 'rgba(255,101,132,0.12)', color: '#ff6584' },
  };
  return map[relation] || map['অন্যান্য'];
}

function renderContacts() {
  const query = document.getElementById('searchInput').value.trim();
  const list = getFilteredContacts(query);
  const container = document.getElementById('contactList');

  if (list.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <h3>কোনো যোগাযোগ নেই</h3>
        <p>${query ? 'এই নামে কাউকে খুঁজে পাওয়া যায়নি।' : '+ বোতাম চেপে নতুন নম্বর যোগ করুন।'}</p>
      </div>`;
    return;
  }

  // Group by first letter
  let html = '';
  if (sortMode === 'name' && !query) {
    const grouped = {};
    list.forEach(c => {
      const key = c.name[0].toUpperCase();
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(c);
    });
    Object.keys(grouped).sort().forEach(key => {
      html += `<div class="section-label">${key}</div>`;
      grouped[key].forEach(c => { html += contactCardHTML(c); });
    });
  } else {
    list.forEach(c => { html += contactCardHTML(c); });
  }

  container.innerHTML = html;
  updateCounts();
}

function contactCardHTML(c) {
  const ts = tagStyle(c.relation);
  return `
    <div class="contact-card" onclick="openDetail('${c.id}')">
      <div class="avatar" style="background:${c.color}22; color:${c.color}; font-size:22px;">${c.emoji}</div>
      <div class="contact-info">
        <div class="contact-name">${escHtml(c.name)}</div>
        <div class="contact-number">${escHtml(c.phone1)}</div>
        <div class="contact-meta">
          <span class="tag" style="background:${ts.bg}; color:${ts.color}">${c.relation}</span>
          ${c.phone2 ? '<span style="font-size:11px;color:var(--text-muted)">+1 নম্বর</span>' : ''}
        </div>
      </div>
      <div class="contact-actions">
        <button class="action-btn btn-call" onclick="event.stopPropagation();callNumber('${escHtml(c.phone1)}')">📞</button>
        <button class="action-btn btn-edit" onclick="event.stopPropagation();openEdit('${c.id}')">✏️</button>
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== DETAIL MODAL =====
function openDetail(id) {
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  const ts = tagStyle(c.relation);
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-avatar" style="background:${c.color}22;">${c.emoji}</div>
    <div class="detail-name">${escHtml(c.name)}</div>
    <div class="detail-relation">
      <span class="tag" style="background:${ts.bg};color:${ts.color};padding:4px 12px;border-radius:8px;">${c.relation}</span>
    </div>
    <div class="number-cards">
      <div class="number-card">
        <div class="number-card-icon" style="background:rgba(67,232,216,0.1);">📱</div>
        <div class="number-card-info">
          <div class="number-card-label">প্রাথমিক নম্বর</div>
          <div class="number-card-value">${escHtml(c.phone1)}</div>
        </div>
        <button class="copy-btn" onclick="copyText('${escHtml(c.phone1)}')">📋</button>
      </div>
      ${c.phone2 ? `
      <div class="number-card">
        <div class="number-card-icon" style="background:rgba(108,99,255,0.1);">☎️</div>
        <div class="number-card-info">
          <div class="number-card-label">দ্বিতীয় নম্বর</div>
          <div class="number-card-value">${escHtml(c.phone2)}</div>
        </div>
        <button class="copy-btn" onclick="copyText('${escHtml(c.phone2)}')">📋</button>
      </div>` : ''}
      ${c.address ? `
      <div class="number-card">
        <div class="number-card-icon" style="background:rgba(255,209,102,0.1);">📍</div>
        <div class="number-card-info">
          <div class="number-card-label">ঠিকানা</div>
          <div class="number-card-value" style="font-family:inherit;font-size:14px;">${escHtml(c.address)}</div>
        </div>
      </div>` : ''}
    </div>
    ${c.note ? `
    <div class="note-section">
      <div class="note-label">📝 নোট</div>
      <div class="note-text">${escHtml(c.note)}</div>
    </div>` : ''}
    <div class="detail-action-row">
      <button class="btn btn-primary" onclick="callNumber('${escHtml(c.phone1)}')">📞 কল করুন</button>
      <button class="btn btn-secondary" onclick="openEdit('${c.id}');closeDetail()">✏️ সম্পাদনা</button>
      <button class="btn btn-danger" onclick="deleteContact('${c.id}')">🗑️</button>
    </div>
  `;
  document.getElementById('detailModal').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
}

// ===== ADD/EDIT MODAL =====
function openAdd() {
  editingId = null;
  selectedEmoji = '👤';
  selectedColor = COLORS[0];
  document.getElementById('modalTitle').textContent = 'নতুন যোগাযোগ যোগ করুন';
  document.getElementById('inputName').value = '';
  document.getElementById('inputPhone1').value = '';
  document.getElementById('inputPhone2').value = '';
  document.getElementById('inputRelation').value = 'পরিবার';
  document.getElementById('inputAddress').value = '';
  document.getElementById('inputNote').value = '';
  renderEmojiPicker();
  renderColorPicker();
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('inputName').focus(), 400);
}

function openEdit(id) {
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  selectedEmoji = c.emoji;
  selectedColor = c.color;
  document.getElementById('modalTitle').textContent = 'যোগাযোগ সম্পাদনা';
  document.getElementById('inputName').value = c.name;
  document.getElementById('inputPhone1').value = c.phone1;
  document.getElementById('inputPhone2').value = c.phone2 || '';
  document.getElementById('inputRelation').value = c.relation;
  document.getElementById('inputAddress').value = c.address || '';
  document.getElementById('inputNote').value = c.note || '';
  renderEmojiPicker();
  renderColorPicker();
  document.getElementById('addModal').classList.add('open');
}

function closeAdd() {
  document.getElementById('addModal').classList.remove('open');
}

function renderEmojiPicker() {
  const el = document.getElementById('emojiPicker');
  el.innerHTML = EMOJIS.map(e => `
    <div class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="selectEmoji('${e}')">${e}</div>
  `).join('');
}

function renderColorPicker() {
  const el = document.getElementById('colorPicker');
  el.innerHTML = COLORS.map(c => `
    <div class="color-opt${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>
  `).join('');
}

function selectEmoji(e) { selectedEmoji = e; renderEmojiPicker(); }
function selectColor(c) { selectedColor = c; renderColorPicker(); }

function saveContact() {
  const name = document.getElementById('inputName').value.trim();
  const phone1 = document.getElementById('inputPhone1').value.trim();
  if (!name || !phone1) { showToast('⚠️ নাম ও নম্বর আবশ্যক'); return; }

  const data = {
    name,
    phone1,
    phone2: document.getElementById('inputPhone2').value.trim(),
    relation: document.getElementById('inputRelation').value,
    address: document.getElementById('inputAddress').value.trim(),
    note: document.getElementById('inputNote').value.trim(),
    emoji: selectedEmoji,
    color: selectedColor,
  };

  if (editingId) {
    const idx = contacts.findIndex(c => c.id === editingId);
    if (idx !== -1) contacts[idx] = { ...contacts[idx], ...data };
    showToast('✅ আপডেট সম্পন্ন');
  } else {
    data.id = Date.now().toString();
    data.createdAt = Date.now();
    contacts.unshift(data);
    showToast('✅ সংরক্ষিত হয়েছে');
  }

  save();
  closeAdd();
  renderContacts();
}

function deleteContact(id) {
  if (!confirm('এই যোগাযোগটি মুছে ফেলবেন?')) return;
  contacts = contacts.filter(c => c.id !== id);
  save();
  closeDetail();
  renderContacts();
  showToast('🗑️ মুছে ফেলা হয়েছে');
}

// ===== UTILS =====
function callNumber(phone) {
  window.location.href = 'tel:' + phone.replace(/\s/g, '');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('📋 কপি হয়েছে!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== EXPORT =====
function exportData() {
  const data = JSON.stringify(contacts, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `number-diary-${new Date().toLocaleDateString('en-GB').replace(/\//g,'-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬆️ ব্যাকআপ ডাউনলোড হচ্ছে...');
}

// ===== EVENTS =====
document.getElementById('addBtn').addEventListener('click', openAdd);
document.getElementById('saveBtn').addEventListener('click', saveContact);
document.getElementById('cancelBtn').addEventListener('click', closeAdd);

document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('searchClear').style.display = this.value ? 'block' : 'none';
  renderContacts();
});

document.getElementById('searchClear').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  this.style.display = 'none';
  renderContacts();
});

document.getElementById('statsBar').addEventListener('click', function(e) {
  const chip = e.target.closest('.stat-chip');
  if (!chip) return;
  document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentFilter = chip.dataset.filter;
  renderContacts();
});

document.getElementById('sortBtn').addEventListener('click', function() {
  sortMode = sortMode === 'name' ? 'recent' : 'name';
  this.classList.toggle('active');
  showToast(sortMode === 'name' ? '🔤 নাম অনুযায়ী সাজানো' : '🕐 সাম্প্রতিক আগে');
  renderContacts();
});

document.getElementById('exportBtn').addEventListener('click', exportData);

// Close modals on overlay click
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAdd();
});
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

// Offline detection
window.addEventListener('online', () => { document.getElementById('offlineBadge').style.display = 'none'; });
window.addEventListener('offline', () => { document.getElementById('offlineBadge').style.display = 'block'; });
if (!navigator.onLine) document.getElementById('offlineBadge').style.display = 'block';

// ===== DEMO DATA (first run) =====
if (contacts.length === 0) {
  contacts = [
    { id:'1', name:'আম্মু', phone1:'01711-000001', phone2:'01811-000002', relation:'পরিবার', address:'ঢাকা, বাংলাদেশ', note:'সন্ধ্যার পর ফোন করা ভালো', emoji:'👵', color:'#43e8d8', createdAt: Date.now()-5000 },
    { id:'2', name:'আব্বু', phone1:'01711-000002', phone2:'', relation:'পরিবার', address:'ঢাকা, বাংলাদেশ', note:'', emoji:'👴', color:'#6c63ff', createdAt: Date.now()-4000 },
    { id:'3', name:'রাহিম ভাই', phone1:'01821-000003', phone2:'', relation:'বন্ধু', address:'চট্টগ্রাম', note:'ভালো বন্ধু, বিশ্বস্ত', emoji:'👨', color:'#ffd166', createdAt: Date.now()-3000 },
    { id:'4', name:'ডাঃ করিম', phone1:'01911-000004', phone2:'01611-000005', relation:'ডাক্তার', address:'স্কয়ার হাসপাতাল, ঢাকা', note:'সোম-শনি সকাল ৯টা থেকে', emoji:'👨‍⚕️', color:'#06d6a0', createdAt: Date.now()-2000 },
    { id:'5', name:'সাকিব অফিস', phone1:'01521-000006', phone2:'', relation:'অফিস', address:'গুলশান, ঢাকা', note:'HR ম্যানেজার', emoji:'👨‍💼', color:'#ff6584', createdAt: Date.now()-1000 },
  ];
  save();
}

// ===== INIT =====
renderContacts();
updateCounts();

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
